name: Build and Deploy
on:
  push: { branches: [main] }
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [staging, production]
env:
  REGISTRY: ghcr.io
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    strategy:
      matrix: { service: [frontend, backend] }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: dockerfiles/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix: { service: [frontend, backend] }
    steps:
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest"
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  deploy-staging:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Deploy to staging via Portainer API or SSH:"
          echo "  docker service update --image ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }} app_frontend"
          echo "  docker service update --image ghcr.io/${{ github.repository_owner }}/backend:${{ github.sha }} app_backend"

  deploy-production:
    needs: [build, security-scan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - run: echo "Production deploy with manual approval gate"
