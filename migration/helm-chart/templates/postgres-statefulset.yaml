apiVersion: apps/v1
kind: StatefulSet
metadata: { name: postgres }
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image }}:{{ .Values.postgres.tag }}"
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: appdb }
            - { name: POSTGRES_USER, valueFrom: { secretKeyRef: { name: app-secrets, key: db-user } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: app-secrets, key: db-password } } }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          livenessProbe: { exec: { command: ["pg_isready", "-U", "appuser"] }, initialDelaySeconds: 30 }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: "{{ .Values.postgres.storage }}" } } }
