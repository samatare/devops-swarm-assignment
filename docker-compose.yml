# =============================================================================
# Production Docker Swarm Stack — Senior DevOps Assignment
# =============================================================================
# Services: Traefik v2.11 (LB), Frontend (nginx), Backend (nginx), PostgreSQL, Redis
# Networks: public (ingress), frontend (FE-BE), backend (BE-DB), monitor (external)
# Secrets:  db_password, db_user, db_connection_string, api_key
#
# Prerequisites:
#   1. Create secrets:  ./scripts/create-secrets.sh
#   2. Create network:  docker network create --driver overlay --opt encrypted=true monitor
#
# Deploy:   docker stack deploy -c docker-compose.yml app
# Remove:   docker stack rm app
# Update:   docker service update --image <new-image> app_<service>
# Rollback: docker service rollback app_<service>
# =============================================================================

version: "3.9"   # Required for Swarm deploy keys (secrets, configs, deploy block)

services:

  # ===========================================================================
  # TRAEFIK v2.11 — Reverse Proxy & Load Balancer
  # ===========================================================================
  # Why Traefik? Native Swarm service discovery via Docker labels.
  # Why v2.11? Docker Engine 29 dropped API <1.40. Traefik v3.x ignores
  #   DOCKER_API_VERSION env var. v2.11 respects it.
  # Why not Nginx? Would need manual upstream config on every deploy.
  # ===========================================================================
  traefik:
    image: traefik:v2.11
    environment:
      - DOCKER_API_VERSION=1.45    # Docker Engine 29 requires API >= 1.40
    command:
      - "--api.dashboard=true"                                    # Enable dashboard UI
      - "--api.insecure=true"                                     # No auth (disable in prod)
      - "--providers.docker=true"                                 # Docker as provider (v2 syntax)
      - "--providers.docker.swarmMode=true"                       # Enable Swarm mode
      - "--providers.docker.endpoint=unix:///var/run/docker.sock" # Socket for discovery
      - "--providers.docker.exposedByDefault=false"               # Only route opt-in services
      - "--providers.docker.network=app_public"                   # Route via public network
      # NOTE: Swarm prefixes stack name → "public" becomes "app_public"
      - "--entryPoints.web.address=:80"                           # HTTP entrypoint
      # --- SSL/TLS (disabled — Let's Encrypt requires domain name, not raw IP) ---
      # To enable HTTPS, add:
      #   - "--entryPoints.websecure.address=:443"
      #   - "--certificatesResolvers.le.acme.email=admin@example.com"
      #   - "--certificatesResolvers.le.acme.storage=/letsencrypt/acme.json"
      #   - "--certificatesResolvers.le.acme.httpChallenge.entryPoint=web"
      # Then change router entrypoints from "web" to "websecure"
      - "--metrics.prometheus=true"                               # Expose /metrics
      - "--entryPoints.metrics.address=:8082"                     # Metrics port
      - "--log.level=INFO"                                        # Log level
    ports:
      - "80:80"        # HTTP — Swarm ingress mesh routes from any node
      - "8080:8080"    # Dashboard — restrict via security group in production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Read-only for security
    networks:
      - public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager   # Only managers have Docker socket
      resources:
        limits:   { cpus: "0.50", memory: 256M }
        reservations: { cpus: "0.25", memory: 128M }

  # ===========================================================================
  # FRONTEND — Web Application (nginx:alpine placeholder)
  # ===========================================================================
  # Placeholder image serving HTTP on port 80. Replace in production:
  #   docker service update --image ghcr.io/yourorg/frontend:v1 app_frontend
  # See dockerfiles/frontend.Dockerfile for optimized multi-stage build.
  # ===========================================================================
  frontend:
    image: nginx:alpine
    networks:
      - public       # Traefik routes traffic here
      - frontend     # Communicates with backend
    healthcheck:
      # wget included in nginx:alpine (curl is not)
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 15s       # Check every 15 seconds
      timeout: 5s         # Fail if no response in 5s
      retries: 3          # Unhealthy after 3 consecutive failures
      start_period: 10s   # Grace period during startup
    deploy:
      replicas: 3         # 3 replicas for high availability
      # --- ROLLING UPDATE (zero downtime) ---
      update_config:
        parallelism: 1           # Update 1 at a time (safest for frontend)
        delay: 15s               # Wait between each update
        failure_action: rollback # Auto-rollback if health check fails
        monitor: 30s             # Watch 30s before declaring success
        order: start-first       # New starts BEFORE old stops = zero downtime
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      # --- PLACEMENT ---
      placement:
        preferences:
          - spread: node.id      # Distribute replicas across all nodes
      # --- RESOURCES ---
      resources:
        limits:   { cpus: "0.50", memory: 512M }       # Hard ceiling
        reservations: { cpus: "0.25", memory: 256M }    # Guaranteed minimum
      # --- TRAEFIK LABELS ---
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
        - "traefik.http.routers.frontend.entrypoints=web"
        - "traefik.http.routers.frontend.priority=1"                    # Lowest priority
        - "traefik.http.services.frontend.loadbalancer.server.port=80"
        # --- SECURITY HEADERS MIDDLEWARE ---
        - "traefik.http.middlewares.sec-headers.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.sec-headers.headers.browserXssFilter=true"
        - "traefik.http.middlewares.sec-headers.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.sec-headers.headers.frameDeny=true"
        - "traefik.http.routers.frontend.middlewares=sec-headers"
        # --- HOST-BASED ROUTING (requires DNS, not available with raw IPs) ---
        # Replace PathPrefix with Host for domain-based routing:
        #   - "traefik.http.routers.frontend.rule=Host(`app.example.com`)"
        #   - "traefik.http.routers.blog.rule=Host(`blog.example.com`)"
        # Combine host + path:
        #   - "traefik.http.routers.api.rule=Host(`app.example.com`) && PathPrefix(`/api`)"
    logging:
      driver: json-file
      options:
        max-size: "10m"    # Rotate at 10MB
        max-file: "3"      # Keep 3 files

  # ===========================================================================
  # BACKEND — API Service (Task 1.2 Deep Dive)
  # ===========================================================================
  # Mode: replicated (fixed count) — we control exact replica count
  # Secrets: mounted as tmpfs at /run/secrets/ (more secure than env vars)
  # Networks: public + frontend + backend (multi-network for isolation)
  # ===========================================================================
  backend:
    image: nginx:alpine
    # --- SWARM SECRETS (Task 1.3) ---
    secrets:
      - db_password            # /run/secrets/db_password
      - db_user                # /run/secrets/db_user
      - db_connection_string   # /run/secrets/db_connection_string
      - api_key                # /run/secrets/api_key
    # --- ENVIRONMENT (non-sensitive config only) ---
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres                          # Swarm DNS resolves service names
      - DB_PORT=5432
      - DB_NAME=appdb
      - REDIS_URL=redis://redis:6379
      - DB_PASSWORD_FILE=/run/secrets/db_password  # App reads from file
      - DB_USER_FILE=/run/secrets/db_user
    networks:
      - public       # Traefik routes /api here
      - frontend     # Accepts requests from frontend
      - backend      # Talks to PostgreSQL and Redis
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 10s       # Faster checks for API
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 3
      # --- UPDATE CONFIG (explained in Task 1.2) ---
      # parallelism: 2      → update 2 per batch (faster with 3 replicas)
      # delay: 10s           → pause between batches
      # failure_action:      → rollback auto-reverts on failure
      # monitor: 30s         → watch 30s before success
      # max_failure_ratio:   → tolerate 25% failures
      # order: start-first   → zero downtime
      update_config:
        parallelism: 2
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.25
        order: start-first
      rollback_config:
        parallelism: 2
        delay: 5s
        failure_action: pause    # If rollback fails, pause for investigation
        order: start-first
      placement:
        preferences:
          - spread: node.id      # Spread across nodes
        constraints:
          - node.role == worker  # Keep manager lean
      resources:
        limits:   { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 128M }
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
        - "traefik.http.routers.backend.entrypoints=web"
        - "traefik.http.routers.backend.priority=10"                     # Higher than frontend
        - "traefik.http.services.backend.loadbalancer.server.port=80"
        # --- STICKY SESSIONS ---
        - "traefik.http.services.backend.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.backend.loadbalancer.sticky.cookie.name=backend_affinity"
        # --- RATE LIMITING ---
        - "traefik.http.middlewares.api-rate.rateLimit.average=100"
        - "traefik.http.middlewares.api-rate.rateLimit.burst=50"
        - "traefik.http.routers.backend.middlewares=api-rate,sec-headers"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ===========================================================================
  # POSTGRESQL — Database (pinned to labeled node)
  # ===========================================================================
  # Why pinned? Swarm volumes are node-local. Without pinning,
  # rescheduling to another node = empty volume = DATA LOSS.
  # In production: use AWS RDS instead of self-hosted.
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    secrets: [db_password, db_user]
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_USER_FILE=/run/secrets/db_user
      - POSTGRES_DB=appdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend    # ONLY backend — isolated from public and frontend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.type == db   # Pin to swarm-worker1
      resources:
        limits:   { cpus: "1.0", memory: 1G }
        reservations: { cpus: "0.50", memory: 512M }

  # ===========================================================================
  # REDIS — Cache (ephemeral data, single replica)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes: [redis-data:/data]
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == worker]
      resources:
        limits: { cpus: "0.50", memory: 256M }

# =============================================================================
# NETWORKS — Multi-tier isolation (encrypted overlays)
# =============================================================================
networks:
  public:    { driver: overlay, driver_opts: { encrypted: "true" }, attachable: true }
  frontend:  { driver: overlay, driver_opts: { encrypted: "true" } }
  backend:   { driver: overlay, driver_opts: { encrypted: "true" } }
  monitor:   { driver: overlay, driver_opts: { encrypted: "true" }, external: true }

# =============================================================================
# VOLUMES — Node-local persistent storage
# =============================================================================
volumes:
  postgres-data:
  redis-data:

# =============================================================================
# SECRETS — Encrypted, mounted as tmpfs at /run/secrets/
# =============================================================================
secrets:
  db_password:          { external: true }
  db_user:              { external: true }
  db_connection_string: { external: true }
  api_key:              { external: true }
