version: "3.9"

services:
  traefik:
    image: traefik:v2.11
    environment:
      - DOCKER_API_VERSION=1.45
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=app_public"
      - "--entryPoints.web.address=:80"
      - "--metrics.prometheus=true"
      - "--entryPoints.metrics.address=:8082"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [public]
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:   { cpus: "0.50", memory: 256M }
        reservations: { cpus: "0.25", memory: 128M }

  frontend:
    image: nginx:alpine
    networks: [public, frontend]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      placement:
        preferences:
          - spread: node.id
      resources:
        limits:   { cpus: "0.50", memory: 512M }
        reservations: { cpus: "0.25", memory: 256M }
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
        - "traefik.http.routers.frontend.entrypoints=web"
        - "traefik.http.routers.frontend.priority=1"
        - "traefik.http.services.frontend.loadbalancer.server.port=80"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  backend:
    image: nginx:alpine
    secrets: [db_password, db_user, db_connection_string, api_key]
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=appdb
      - REDIS_URL=redis://redis:6379
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - DB_USER_FILE=/run/secrets/db_user
    networks: [public, frontend, backend]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 2
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.25
        order: start-first
      rollback_config:
        parallelism: 2
        delay: 5s
        failure_action: pause
        order: start-first
      placement:
        preferences:
          - spread: node.id
        constraints: [node.role == worker]
      resources:
        limits:   { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 128M }
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
        - "traefik.http.routers.backend.entrypoints=web"
        - "traefik.http.routers.backend.priority=10"
        - "traefik.http.services.backend.loadbalancer.server.port=80"
        - "traefik.http.services.backend.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.backend.loadbalancer.sticky.cookie.name=backend_affinity"
        - "traefik.http.middlewares.api-rate.rateLimit.average=100"
        - "traefik.http.middlewares.api-rate.rateLimit.burst=50"
        - "traefik.http.routers.backend.middlewares=api-rate"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  postgres:
    image: postgres:15-alpine
    secrets: [db_password, db_user]
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_USER_FILE=/run/secrets/db_user
      - POSTGRES_DB=appdb
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.type == db]
      resources:
        limits:   { cpus: "1.0", memory: 1G }
        reservations: { cpus: "0.50", memory: 512M }

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes: [redis-data:/data]
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == worker]
      resources:
        limits:   { cpus: "0.50", memory: 256M }

networks:
  public:
    driver: overlay
    driver_opts: { encrypted: "true" }
    attachable: true
  frontend:
    driver: overlay
    driver_opts: { encrypted: "true" }
  backend:
    driver: overlay
    driver_opts: { encrypted: "true" }
  monitor:
    driver: overlay
    driver_opts: { encrypted: "true" }
    external: true

volumes:
  postgres-data:
  redis-data:

secrets:
  db_password:          { external: true }
  db_user:              { external: true }
  db_connection_string: { external: true }
  api_key:              { external: true }
