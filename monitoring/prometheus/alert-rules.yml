groups:
  - name: swarm-service-alerts
    rules:
      - alert: ServiceReplicasBelowDesired
        expr: count by (container_label_com_docker_swarm_service_name)(container_tasks_state{state="running"}) < 1
        for: 2m
        labels: { severity: critical }
        annotations: { summary: "Service {{ $labels.container_label_com_docker_swarm_service_name }} replicas below desired" }

      - alert: NodeDown
        expr: up{job="node-exporter"} == 0
        for: 1m
        labels: { severity: critical }
        annotations: { summary: "Node {{ $labels.instance }} is unreachable" }

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 90
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "Container {{ $labels.name }} memory > 90%" }

      - alert: HighContainerRestarts
        expr: increase(container_restart_count[1h]) > 5
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "Container {{ $labels.name }} restarted {{ $value }} times in 1h" }

      - alert: HighNodeCPU
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "Node {{ $labels.instance }} CPU > 90%" }

      - alert: BackendHighResponseTime
        expr: histogram_quantile(0.95, sum(rate(traefik_service_request_duration_seconds_bucket{service="backend@docker"}[5m])) by (le)) > 2
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "Backend p95 response time > 2 seconds" }

      - alert: BackendHighErrorRate
        expr: sum(rate(traefik_service_requests_total{service="backend@docker",code=~"5.."}[5m])) / sum(rate(traefik_service_requests_total{service="backend@docker"}[5m])) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations: { summary: "Backend error rate > 5%" }

      - alert: DatabaseConnectionFailure
        expr: pg_up == 0
        for: 1m
        labels: { severity: critical }
        annotations: { summary: "PostgreSQL connection failure" }
