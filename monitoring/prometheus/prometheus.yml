global: { scrape_interval: 15s }
rule_files: [alert-rules.yml]
alerting: { alertmanagers: [{ static_configs: [{ targets: [alertmanager:9093] }] }] }
scrape_configs:
  - { job_name: prometheus,    static_configs: [{ targets: ["localhost:9090"] }] }
  - { job_name: node-exporter, dns_sd_configs: [{ names: [tasks.node-exporter], type: A, port: 9100 }] }
  - { job_name: cadvisor,      dns_sd_configs: [{ names: [tasks.cadvisor], type: A, port: 8080 }] }
  - { job_name: traefik,       static_configs: [{ targets: ["traefik:8082"] }] }